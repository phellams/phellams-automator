generate-runtime-badge:
  stage: notify
  image: sgkens/phellams-automator:$AUTOMATOR_VERSION
  rules:
    - when: always
  tags:
    - docker
  script:
    - |
      pwsh -Command "& {
        & ./scripts/Calculate-Runtime.ps1;
        & ./scripts/Generate-Badge.ps1 -Label 'runtime' -Message $RUNTIME_STR -Style 'flat' -IncludeIcon -LabelColor '#555' -MessageColor '#007acc' -OutputPath 'runtime-badge-flat.svg';
      }"
  artifacts:
    paths:
      - runtime-badge-flat.svg
      - runtime-badge-for-the-badge.svg
      - runtime.env
    expire_in: never