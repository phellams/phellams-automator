deploy-image-dockerhub:
  stage: deploy
  # dependencies:
  #   - build-image-commit_sha # load build.env from build-image-commit_sha
  needs: [build-image-commit_sha, test-image-commit_sha]
    # - job: build-image-commit_sha
    #   artifacts: false
    # - job: test-image-commit_sha
    #   artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script: 
    - echo "$DOCKERHUB_API_KEY" | docker login --username "$DOCKERHUB_USER" --password-stdin
  after_script:
    - docker logout
  tags:
    - linux-shell
  script:
  # git fetch --all required to pull down full commit history for semver generation
    - |
      git fetch --all 
      echo "GENERATE -> SEMVER version from git history"
      semver=$(pwsh -c "Import-Module ./includes/modules/conventionalcommitversion; (Get-ConventionalCommitVersion).Version") # Capture version
      echo "GENERATED -> SEMVER -> $semver"
      SEMVER_VERSION=$semver
      docker pull "$DOCKERHUB_USER/phellams-automator:$CI_COMMIT_SHA"
      docker tag "$DOCKERHUB_USER/phellams-automator:$CI_COMMIT_SHA" "$DOCKERHUB_USER/phellams-automator:latest"
      docker push "$DOCKERHUB_USER/phellams-automator:latest"
      docker tag "$DOCKERHUB_USER/phellams-automator:$CI_COMMIT_SHA" "$DOCKERHUB_USER/phellams-automator:$SEMVER_VERSION"
      docker push "$DOCKERHUB_USER/phellams-automator:$SEMVER_VERSION"
      echo "Pushed to DockerHub: $DOCKERHUB_USER/phellams-automator:latest"
      pwsh -File ./scripts/Generate-Badge.ps1 -Label "version" -Message "$SEMVER_VERSION" -Style "flat" -LabelColor "#555" -MessageColor "#4c1" -OutputPath "version-badge-flat.svg"
      pwsh -File ./scripts/Generate-Badge.ps1 -Label "version" -Message "$SEMVER_VERSION" -Style "for-the-badge" -LabelColor "#555" -MessageColor "#4c1" -OutputPath "version-badge-for-the-badge.svg"
  artifacts:
    paths:
      - version-badge-flat.svg
      - version-badge-for-the-badge.svg
    expire_in: 1 week

image-cleanup:
  stage: deploy
  needs: [deploy-image-dockerhub]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  # before_script:
  #   - echo "$DOCKERHUB_API_KEY" | docker login --username "$DOCKERHUB_USER" --password-stdin
  # after_script:
  #   - docker logout
  tags:
    - linux-shell
  script:
    - chmod +x ./scripts/docker_sha_cleanup.sh
    - bash -c ./scripts/docker_sha_cleanup.sh

